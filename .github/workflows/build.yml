name: Build and Release

on:
  push:
    tags:
      - 'v*'
  # Lets contributors verify a build without cutting a release.
  workflow_dispatch:
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Release, universal)
        run: |
          xcodebuild \
            -project MultiSoundChanger.xcodeproj \
            -scheme MultiSoundChanger \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify both architectures are present
        run: |
          APP="build/Build/Products/Release/MultiSoundChanger.app"
          lipo -info "$APP/Contents/MacOS/MultiSoundChanger"
          # A universal binary is the whole point of this fork — fail loudly if a slice is missing.
          lipo -info "$APP/Contents/MacOS/MultiSoundChanger" | grep -q "arm64" || exit 1
          lipo -info "$APP/Contents/MacOS/MultiSoundChanger" | grep -q "x86_64" || exit 1

      - name: Ad-hoc sign
        run: |
          APP="build/Build/Products/Release/MultiSoundChanger.app"
          # Ad-hoc only: no Developer ID behind this fork, so this is not a substitute for
          # notarization. Gatekeeper still warns users on first launch (documented in README).
          codesign --sign - --force --deep --timestamp=none "$APP"
          codesign --verify --verbose "$APP"

      - name: Archive
        run: |
          APP="build/Build/Products/Release/MultiSoundChanger.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" MultiSoundChanger.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiSoundChanger
          path: MultiSoundChanger.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MultiSoundChanger.zip
          generate_release_notes: true
