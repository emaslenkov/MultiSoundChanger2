name: Build and Release

on:
  push:
    tags:
      - 'v*'
  # Lets contributors verify a build without cutting a release.
  workflow_dispatch:
  pull_request:
    branches: [ master ]

permissions:
  contents: write

env:
  APP_NAME: MultiSoundChanger2

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Release, universal)
        run: |
          xcodebuild \
            -project MultiSoundChanger.xcodeproj \
            -scheme MultiSoundChanger \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate the built app
        id: locate
        run: |
          # Discovered rather than hardcoded: the product name has been renamed once already,
          # and a stale path here fails the build long after the rename looks done.
          APP=$(find build/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app found in build/Build/Products/Release"
            ls -la build/Build/Products/Release || true
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Found: $APP"

      - name: Verify both architectures are present
        run: |
          APP="${{ steps.locate.outputs.app }}"
          BIN="$APP/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP/Contents/Info.plist")"
          lipo -info "$BIN"
          # A universal binary is the whole point of this fork — fail loudly if a slice is missing.
          lipo -info "$BIN" | grep -q "arm64"  || { echo "::error::arm64 slice missing";  exit 1; }
          lipo -info "$BIN" | grep -q "x86_64" || { echo "::error::x86_64 slice missing"; exit 1; }

      - name: Verify no private framework is linked
        run: |
          APP="${{ steps.locate.outputs.app }}"
          BIN="$APP/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP/Contents/Info.plist")"
          # This fork exists partly to stop depending on the private OSD.framework.
          # If a private framework creeps back in, say so here rather than in users' crash logs.
          if otool -L "$BIN" | grep -i "PrivateFrameworks"; then
            echo "::error::Binary links against a private framework"
            exit 1
          fi
          echo "No private frameworks linked."

      - name: Ad-hoc sign
        run: |
          APP="${{ steps.locate.outputs.app }}"
          # Ad-hoc only: there is no Developer ID behind this fork, so this is not a substitute for
          # notarization. Gatekeeper still warns on first launch (documented in the README).
          codesign --sign - --force --deep --timestamp=none "$APP"
          codesign --verify --verbose "$APP"

      - name: Archive
        run: |
          APP="${{ steps.locate.outputs.app }}"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "${{ env.APP_NAME }}.zip"
          ls -lh "${{ env.APP_NAME }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.APP_NAME }}
          path: ${{ env.APP_NAME }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}.zip
          generate_release_notes: true
